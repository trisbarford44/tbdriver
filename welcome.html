<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DriveDeck Welcome</title>
  <style>
    :root { --green:#00ff8a; --blue:#00b7ff; --black:#020403; }
    * { box-sizing:border-box; }
    body { margin:0; height:100vh; overflow:hidden; background:radial-gradient(circle at center, rgba(0,255,138,.12), transparent 45%), linear-gradient(145deg,#020403,#06110c 55%,#000); color:#f4fff9; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; display:flex; align-items:center; justify-content:center; }
    .screen { width:min(92vw,900px); text-align:center; transition:opacity .9s ease, transform .9s ease; }
    .screen.exit { opacity:0; transform:scale(1.04); }
    .mode { letter-spacing:.35em; font-size:.8rem; color:var(--green); text-transform:uppercase; margin-bottom:18px; }
    h1 { font-size:clamp(2.2rem,8vw,5rem); margin:0; font-weight:600; letter-spacing:-.04em; }
    .sub { margin-top:12px; color:rgba(244,255,249,.68); font-size:.9rem; letter-spacing:.15em; text-transform:uppercase; }
    canvas { width:100%; height:220px; margin-top:34px; filter:drop-shadow(0 0 18px rgba(0,255,138,.5)); }
    button { margin-top:34px; border:1px solid rgba(0,255,138,.7); background:linear-gradient(135deg,rgba(0,66,37,.95),rgba(0,183,255,.16)); color:white; padding:16px 34px; border-radius:999px; font-size:.85rem; letter-spacing:.22em; text-transform:uppercase; box-shadow:0 0 28px rgba(0,255,138,.22); }
    button.hidden { display:none; }
    .status { margin-top:14px; font-size:.75rem; color:rgba(244,255,249,.5); letter-spacing:.14em; text-transform:uppercase; }
  </style>
</head>
<body>
  <main id="screen" class="screen">
    <div class="mode">DriveDeck</div>
    <h1 id="welcomeTitle">Welcome.</h1>
    <div class="sub">Drive system initialising</div>
    <canvas id="waveform"></canvas>
    <button id="startButton">Start Drive Mode</button>
    <div id="status" class="status">Tap to initialise audio</div>
    <audio id="welcomeAudio" preload="auto"></audio>
  </main>
  <script>
    const audioFiles = ["greeting1.mp3","greeting2.mp3","greeting3.mp3"];
    const dashboardPage = "index.html";
    const audio = document.getElementById("welcomeAudio"), button = document.getElementById("startButton"), statusText = document.getElementById("status"), screen = document.getElementById("screen"), canvas = document.getElementById("waveform"), ctx = canvas.getContext("2d"), title = document.getElementById("welcomeTitle");
    let audioContext, analyser, source, dataArray;
    const savedName = localStorage.getItem("drivedeck_profile_name") || "Tris";
    const lines = [`Welcome, ${savedName}.`,`Good evening, ${savedName}.`,`DriveDeck is ready, ${savedName}.`];
    title.textContent = lines[Math.floor(Math.random()*lines.length)];
    function chooseAudio(){ const last=localStorage.getItem("lastGreetingFile"); let choices=audioFiles.filter(f=>f!==last); if(!choices.length) choices=audioFiles; const selected=choices[Math.floor(Math.random()*choices.length)]; localStorage.setItem("lastGreetingFile",selected); audio.src=selected; }
    function resizeCanvas(){ canvas.width=canvas.offsetWidth*devicePixelRatio; canvas.height=canvas.offsetHeight*devicePixelRatio; }
    function setupAudio(){ audioContext=new (window.AudioContext||window.webkitAudioContext)(); analyser=audioContext.createAnalyser(); analyser.fftSize=2048; source=audioContext.createMediaElementSource(audio); source.connect(analyser); analyser.connect(audioContext.destination); dataArray=new Uint8Array(analyser.frequencyBinCount); }
    function draw(){ requestAnimationFrame(draw); const w=canvas.width,h=canvas.height,c=h/2; ctx.clearRect(0,0,w,h); const grad=ctx.createLinearGradient(0,0,w,0); grad.addColorStop(0,"rgba(0,66,37,.2)"); grad.addColorStop(.5,"rgba(0,255,138,1)"); grad.addColorStop(1,"rgba(0,183,255,.9)"); ctx.lineWidth=3*devicePixelRatio; ctx.strokeStyle=grad; ctx.beginPath(); if(analyser){ analyser.getByteTimeDomainData(dataArray); const sw=w/dataArray.length; let x=0; dataArray.forEach((v,i)=>{ const y=(v/128)*c; if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y); x+=sw; }); } else { const t=Date.now()*.003; for(let x=0;x<w;x+=8){ const y=c+Math.sin(x*.015+t)*24*devicePixelRatio; if(x===0)ctx.moveTo(x,y); else ctx.lineTo(x,y); } } ctx.stroke(); }
    async function start(){ button.classList.add("hidden"); statusText.textContent="Audio initialised"; try{ if(!audioContext) setupAudio(); await audioContext.resume(); await audio.play(); const delay=Math.max(4300, isFinite(audio.duration)?audio.duration*1000+800:4300); setTimeout(()=>{screen.classList.add("exit"); setTimeout(()=>location.href=dashboardPage,900);},delay); } catch(e){ statusText.textContent="Audio blocked — continuing"; setTimeout(()=>location.href=dashboardPage,1500); } }
    chooseAudio(); resizeCanvas(); draw(); button.addEventListener("click",start); addEventListener("resize",resizeCanvas);
  </script>
</body>
</html>
