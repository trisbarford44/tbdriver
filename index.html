<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sport GT+ Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <main class="dash">
    <header class="topbar">
      <div>
        <div class="mode">Sport GT+</div>
        <div class="status" id="gpsStatus">Awaiting GPS</div>
      </div>
      <div class="clock" id="clock">--:--</div>
    </header>
    <section class="speed-panel">
      <div class="ring"><div class="speed" id="speed">0</div><div class="unit">km/h</div></div>
      <div class="bearing"><span id="bearing">---</span><small>Compass</small></div>
    </section>
    <section class="stats">
      <div class="card"><span id="maxSpeed">0</span><small>Max speed</small></div>
      <div class="card"><span id="avgSpeed">0</span><small>Avg speed</small></div>
      <div class="card"><span id="tripDistance">0.00</span><small>Trip km</small></div>
    </section>
    <nav class="actions">
      <button onclick="openSpotify()">Spotify</button>
      <button onclick="openWaze()">Waze</button>
      <button onclick="openPhone()">Phone</button>
      <button onclick="openMaps()">Maps</button>
    </nav>
  </main>
  <script src="app.js"></script>
</body>
</html>
