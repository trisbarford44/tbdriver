<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050608" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tris Drive" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icon-192.svg" />
  <link rel="stylesheet" href="styles.css" />
  <title>Tris Drive</title>
</head>
<body>
  <main class="app-shell">
    <header class="cockpit-top">
      <button id="spotifyTopBtn" class="top-action">Spotify</button>
      <div class="brand-block">
        <p class="eyebrow">GT DRIVE MODE</p>
        <h1>Tris Drive</h1>
      </div>
      <div class="status-stack">
        <span id="clock">--:--</span>
        <span id="battery">--%</span>
      </div>
    </header>

    <section class="dashboard">
      <aside class="side-column left-column">
        <article class="gauge-card compass-card">
          <p>Heading</p>
          <div class="mini-compass">
            <div id="needle" class="needle"></div>
            <span id="direction">--</span>
          </div>
          <strong id="heading">--°</strong>
        </article>

        <article class="gauge-card compact-card">
          <p>Trip</p>
          <strong id="tripDistance">0.00 km</strong>
          <span id="tripTime">00:00:00</span>
        </article>
      </aside>

      <section class="speed-cluster">
        <div class="arc-shell" aria-hidden="true">
          <div class="arc arc-left"></div>
          <div class="arc arc-right"></div>
        </div>
        <div class="speed-readout">
          <span id="speed" class="speed">--</span>
          <span id="unit" class="unit">km/h</span>
        </div>
        <div class="gps-row">
          <span id="gpsStatus">GPS idle</span>
          <span>•</span>
          <span id="accuracy">Accuracy -- m</span>
        </div>
        <div class="drive-controls">
          <button id="startBtn" class="primary">Start</button>
          <button id="stopBtn">Stop</button>
          <button id="resetBtn">Reset</button>
        </div>
      </section>

      <aside class="side-column right-column">
        <article class="gauge-card compact-card accent-card">
          <p>Max Speed</p>
          <strong id="maxSpeed">0 km/h</strong>
          <span>session peak</span>
        </article>

        <article class="gauge-card compact-card">
          <p>Average</p>
          <strong id="avgSpeed">0 km/h</strong>
          <span>moving average</span>
        </article>
      </aside>
    </section>

    <section class="quick-actions">
      <button id="spotifyBtn" class="launcher primary-launcher">Spotify</button>
      <a class="launcher" href="waze://">Waze</a>
      <a class="launcher" href="maps://">Maps</a>
      <a class="launcher" href="tel:">Phone</a>
      <button id="wakeLockBtn" class="launcher">Screen On</button>
      <button id="soundBtn" class="launcher">Sound</button>
    </section>

    <section class="settings-panel">
      <label>
        Units
        <select id="unitsSelect">
          <option value="kmh">km/h</option>
          <option value="mph">mph</option>
        </select>
      </label>
      <label>
        Display style
        <select id="themeSelect">
          <option value="hybrid">Hybrid GT</option>
          <option value="aston">Aston luxury</option>
          <option value="amg">AMG sport</option>
          <option value="night">Night stealth</option>
        </select>
      </label>
    </section>

    <audio id="startupAudio" preload="auto">
      <source src="assets/startup.wav" type="audio/wav" />
    </audio>
  </main>

  <script src="app.js"></script>
</body>
</html>
