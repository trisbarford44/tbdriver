<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sport GT+ Dashboard</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="dashboard">
    <header class="topbar">
      <div>
        <div id="modeLabel" class="mode">SPORT GT+</div>
        <div id="gpsStatus" class="status">GPS INITIALISING</div>
      </div>
      <div class="top-actions">
        <div id="clock" class="clock">--:--</div>
        <button id="settingsButton" class="settings-button" aria-label="Open configuration menu" type="button">☰</button>
      </div>
    </header>

    <section class="main-grid">
      <section class="speed-card">
        <div class="speed-ring">
          <svg viewBox="0 0 240 240" class="ring-svg" aria-hidden="true">
            <circle class="ring-bg" cx="120" cy="120" r="96"></circle>
            <circle id="speedArc" class="ring-arc" cx="120" cy="120" r="96"></circle>
          </svg>
          <div class="speed-inner">
            <div id="speed" class="speed">0</div>
            <div id="unitLabel" class="unit">KM/H</div>
          </div>
        </div>
      </section>

      <section id="compassWidget" class="compass-card stat-card">
        <div id="compass" class="stat-value accent">---</div>
        <div class="stat-label">COMPASS</div>
      </section>
    </section>

    <section id="statsGrid" class="stats-grid">
      <div id="maxWidget" class="stat-card">
        <div id="maxSpeed" class="stat-value">0</div>
        <div class="stat-label">MAX SPEED</div>
      </div>
      <div id="avgWidget" class="stat-card">
        <div id="avgSpeed" class="stat-value">0</div>
        <div class="stat-label">AVG SPEED</div>
      </div>
      <div id="tripWidget" class="stat-card">
        <div id="tripDistance" class="stat-value">0.00</div>
        <div class="stat-label">TRIP KM</div>
      </div>
    </section>

    <nav id="actionsBar" class="actions" aria-label="Driving shortcuts">
      <button onclick="openSpotify()" type="button">Spotify</button>
      <button onclick="openWaze()" type="button">Waze</button>
      <button onclick="openPhone()" type="button">Phone</button>
      <button onclick="openMaps()" type="button">Maps</button>
    </nav>
  </main>

  <div id="settingsOverlay" class="settings-overlay" aria-hidden="true"></div>

  <aside id="settingsPanel" class="settings-panel" aria-label="Configuration menu">
    <div class="settings-head">
      <div>
        <div class="settings-kicker">CONFIGURATION</div>
        <h2>Sport GT+</h2>
      </div>
      <button id="closeSettings" class="close-button" type="button" aria-label="Close configuration menu">×</button>
    </div>

    <div class="settings-group">
      <label for="themeSelect">Theme</label>
      <select id="themeSelect">
        <option value="gt">British Racing GT</option>
        <option value="blue">Dark Neon Blue</option>
        <option value="red">Track Red</option>
        <option value="stealth">Stealth Black</option>
      </select>
    </div>

    <div class="settings-group">
      <label for="maxSpeedSelect">Speed ring range</label>
      <select id="maxSpeedSelect">
        <option value="160">160 km/h</option>
        <option value="200">200 km/h</option>
        <option value="220">220 km/h</option>
        <option value="260">260 km/h</option>
      </select>
    </div>

    <div class="settings-group">
      <label for="modeNameInput">Drive mode label</label>
      <input id="modeNameInput" type="text" maxlength="18" value="SPORT GT+" />
    </div>

    <div class="settings-group">
      <label for="phoneModeSelect">Phone button action</label>
      <select id="phoneModeSelect">
        <option value="shortcut">Siri Shortcut: Drive Call</option>
        <option value="dialer">Open dialer</option>
      </select>
    </div>

    <div class="settings-toggle">
      <div>
        <strong>Speed smoothing</strong>
        <span>Reduces GPS jumping</span>
      </div>
      <input id="smoothToggle" type="checkbox" />
    </div>

    <div class="settings-toggle">
      <div>
        <strong>Compass widget</strong>
        <span>Show bearing tile</span>
      </div>
      <input id="compassToggle" type="checkbox" />
    </div>

    <button id="enableCompassButton" class="panel-action subtle" type="button">Enable iPhone Compass</button>

    <div class="settings-toggle">
      <div>
        <strong>Trip stats</strong>
        <span>Max, average and distance</span>
      </div>
      <input id="statsToggle" type="checkbox" />
    </div>

    <div class="settings-toggle">
      <div>
        <strong>Shortcut buttons</strong>
        <span>Spotify, Waze, Phone, Maps</span>
      </div>
      <input id="actionsToggle" type="checkbox" />
    </div>

    <button id="resetTripButton" class="panel-action" type="button">Reset Trip Data</button>
    <button id="resetSettingsButton" class="panel-action subtle" type="button">Restore Defaults</button>
  </aside>

  <script src="app.js"></script>
</body>
</html>
