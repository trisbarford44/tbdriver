<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DriveDeck v5</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <div id="driveMode" class="mode">SPORT GT+</div>
        <div id="profileName" class="profile-name">DriveDeck</div>
      </div>
      <div id="clock" class="clock">--:--</div>
      <button id="settingsToggle" class="icon-button" aria-label="Open settings">☰</button>
    </header>

    <main class="dashboard">
      <section class="speed-card">
        <div class="speed-ring" id="speedRing">
          <div class="speed-inner">
            <div id="speedValue" class="speed-value">0</div>
            <div id="speedUnit" class="speed-unit">KM/H</div>
          </div>
        </div>
        <div id="gpsStatus" class="gps-status">GPS waiting</div>
      </section>

      <section class="widget-zone">
        <div id="compassWidget" class="widget compass-widget">
          <div class="widget-label">Compass</div>
          <div id="compassRender" class="compass-render text-compass">--</div>
        </div>
        <div class="widget">
          <div class="widget-label">Max</div>
          <div id="maxSpeed" class="widget-value">0</div>
        </div>
        <div class="widget">
          <div class="widget-label">Average</div>
          <div id="avgSpeed" class="widget-value">0</div>
        </div>
        <div class="widget">
          <div class="widget-label">Trip</div>
          <div id="tripDistance" class="widget-value">0.0</div>
        </div>
      </section>

      <section id="launcherGrid" class="launcher-grid"></section>
    </main>

    <aside id="settingsPanel" class="settings-panel" aria-hidden="true">
      <div class="settings-head">
        <div>
          <div class="panel-title">DriveDeck Settings</div>
          <div class="panel-subtitle">v5.0 product foundation</div>
        </div>
        <button id="settingsClose" class="icon-button">×</button>
      </div>

      <div class="settings-scroll">
        <section class="settings-section">
          <h3>Profile</h3>
          <label>Name
            <input id="userNameInput" type="text" placeholder="Tris" />
          </label>
          <label>Drive mode label
            <input id="driveModeInput" type="text" placeholder="SPORT GT+" />
          </label>
        </section>

        <section class="settings-section">
          <h3>Theme Presets</h3>
          <select id="themePreset">
            <option value="aston">Aston GT</option>
            <option value="amg">AMG Black Series</option>
            <option value="porsche">Porsche Sport</option>
            <option value="mclaren">McLaren Tech</option>
            <option value="stealth">Stealth</option>
            <option value="custom">Custom</option>
          </select>
        </section>

        <section class="settings-section colour-grid">
          <h3>Colour Engine</h3>
          <label>Primary <input id="primaryColor" type="color" /></label>
          <label>Secondary <input id="secondaryColor" type="color" /></label>
          <label>Accent <input id="accentColor" type="color" /></label>
          <label>Glow <input id="glowColor" type="color" /></label>
          <label>Background <input id="backgroundColor" type="color" /></label>
          <label>Widget <input id="widgetColor" type="color" /></label>
        </section>

        <section class="settings-section">
          <h3>Speed</h3>
          <label>Units
            <select id="unitSelect">
              <option value="kmh">KM/H</option>
              <option value="mph">MPH</option>
            </select>
          </label>
          <label>Ring max speed
            <input id="ringMaxInput" type="number" min="60" max="320" step="10" />
          </label>
          <label class="switch-row"><input id="smoothSpeedToggle" type="checkbox" /> Smooth GPS speed</label>
        </section>

        <section class="settings-section">
          <h3>Compass</h3>
          <button id="enableCompass" class="panel-button">Enable iPhone Compass</button>
          <label>Compass style
            <select id="compassStyle">
              <option value="text">Text based</option>
              <option value="modern">Modern digital</option>
              <option value="futuristic">Futuristic radar</option>
              <option value="traditional">Traditional circle</option>
              <option value="strip">Bearing strip</option>
            </select>
          </label>
        </section>

        <section class="settings-section">
          <h3>Launcher Slots</h3>
          <div id="launcherEditor"></div>
        </section>

        <section class="settings-section">
          <h3>Drive History</h3>
          <div id="historyList" class="history-list">No previous drives yet.</div>
          <button id="saveDrive" class="panel-button">Save Current Drive</button>
          <button id="clearHistory" class="panel-button danger">Clear History</button>
        </section>

        <section class="settings-section">
          <h3>System</h3>
          <button id="resetTrip" class="panel-button">Reset Current Trip</button>
          <button id="restoreDefaults" class="panel-button danger">Restore Defaults</button>
        </section>
      </div>
    </aside>

    <div id="panelScrim" class="panel-scrim"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
