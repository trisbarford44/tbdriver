<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sport GT+ Dashboard</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="dashboard">
    <header class="topbar">
      <div>
        <div class="mode">SPORT GT+</div>
        <div id="gpsStatus" class="status">GPS INITIALISING</div>
      </div>
      <div id="clock" class="clock">--:--</div>
    </header>

    <section class="main-grid">
      <section class="speed-card">
        <div class="speed-ring">
          <svg viewBox="0 0 240 240" class="ring-svg" aria-hidden="true">
            <circle class="ring-bg" cx="120" cy="120" r="96"></circle>
            <circle id="speedArc" class="ring-arc" cx="120" cy="120" r="96"></circle>
          </svg>
          <div class="speed-inner">
            <div id="speed" class="speed">0</div>
            <div class="unit">KM/H</div>
          </div>
        </div>
      </section>

      <section class="compass-card stat-card">
        <div id="compass" class="stat-value accent">---</div>
        <div class="stat-label">COMPASS</div>
      </section>
    </section>

    <section class="stats-grid">
      <div class="stat-card">
        <div id="maxSpeed" class="stat-value">0</div>
        <div class="stat-label">MAX SPEED</div>
      </div>
      <div class="stat-card">
        <div id="avgSpeed" class="stat-value">0</div>
        <div class="stat-label">AVG SPEED</div>
      </div>
      <div class="stat-card">
        <div id="tripDistance" class="stat-value">0.00</div>
        <div class="stat-label">TRIP KM</div>
      </div>
    </section>

    <nav class="actions" aria-label="Driving shortcuts">
      <button onclick="openSpotify()">Spotify</button>
      <button onclick="openWaze()">Waze</button>
      <button onclick="openPhone()">Phone</button>
      <button onclick="openMaps()">Maps</button>
    </nav>
  </main>

  <script src="app.js"></script>
</body>
</html>
